<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML Competition War Room</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            color: #94a3b8;
            font-size: 0.9em;
            margin-top: 5px;
        }
        
        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        input, select, button {
            padding: 10px 15px;
            border-radius: 5px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #e2e8f0;
            font-size: 14px;
        }
        
        button {
            cursor: pointer;
            background: #667eea;
            border: none;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #764ba2;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: #1e293b;
            border-radius: 8px;
            overflow: hidden;
        }
        
        th {
            background: #334155;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 1px;
        }
        
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #334155;
        }
        
        tr:hover {
            background: #2d3748;
        }
        
        .rank {
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 20px;
            display: inline-block;
            font-size: 0.85em;
        }
        
        .rank.top3 {
            background: #ffd700;
            color: #000;
        }
        
        .rank.top10 {
            background: #c0c0c0;
            color: #000;
        }
        
        .rank.other {
            background: #cd7f32;
            color: #fff;
        }
        
        .platform {
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 0.8em;
            background: #667eea;
            color: white;
        }
        
        .score {
            font-family: 'Courier New', monospace;
            color: #22c55e;
            font-weight: bold;
        }
        
        .tags {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }
        
        .tag {
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 0.75em;
            background: #334155;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚔️ ML Competition War Room</h1>
        <p>Command Center for Competition Tracking</p>
    </div>
    
    <div class="stats">
        <div class="stat-card">
            <div class="stat-value">20</div>
            <div class="stat-label">Total Competitions</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">5</div>
            <div class="stat-label">Top 3 Finishes</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">8</div>
            <div class="stat-label">Top 10 Finishes</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">19</div>
            <div class="stat-label">Zindi Platform</div>
        </div>
    </div>
    
    <div class="controls">
        <input type="text" id="searchInput" placeholder="Search competitions...">
        <select id="filterRank">
            <option value="all">All Ranks</option>
            <option value="top3">Top 3</option>
            <option value="top10">Top 10</option>
        </select>
        <select id="filterPlatform">
            <option value="all">All Platforms</option>
            <option value="Zindi">Zindi</option>
            <option value="ITU">ITU</option>
        </select>
        <button onclick="exportData()">📊 Export CSV</button>
    </div>
    
    <table id="competitionsTable">
        <thead>
            <tr>
                <th>Competition</th>
                <th>Platform</th>
                <th>Rank</th>
                <th>Score</th>
                <th>Key Techniques</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- Data will be inserted here -->
        </tbody>
    </table>

    <script>

            {

            },
            {

            },
            {

            },
            {

            },
            {

            },
            {

            {

                techniques: ["YOLO11s", "Weighted Box Fusion", "Multi-Scale Inference", "EigenCAM"],

            },
            {

                rank: 1,

            {

            },
            {

            {

            {

            {

            {

            {

                status: "Completed"
            },
            {
                name: "Bank Transaction Categorization",
                platform: "Zindi",
                rank: 1,
                score: "1st Place",
                techniques: ["NLP", "Transaction Classification", "Multi-label Classification"],
                status: "Completed"
            }
        ];

        function getRankClass(rank) {
            if (!rank) return 'other';
            if (rank <= 3) return 'top3';
            if (rank <= 10) return 'top10';
            return 'other';
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            data.forEach(comp => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${comp.name}</strong></td>
                    <td><span class="platform">${comp.platform}</span></td>
                    <td>${comp.rank ? `<span class="rank ${getRankClass(comp.rank)}">#${comp.rank}</span>` : 'N/A'}</td>
                    <td><span class="score">${comp.score}</span></td>
                    <td>
                        <div class="tags">
                            ${comp.techniques.map(t => `<span class="tag">${t}</span>`).join('')}
                        </div>
                    </td>
                    <td>${comp.status}</td>
                `;
                tbody.appendChild(row);
            });
        }

        function filterData() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const rankFilter = document.getElementById('filterRank').value;
            const platformFilter = document.getElementById('filterPlatform').value;
            
            let filtered = competitions.filter(comp => {
                const matchesSearch = comp.name.toLowerCase().includes(searchTerm) || 
                                    comp.techniques.some(t => t.toLowerCase().includes(searchTerm));
                
                let matchesRank = true;
                if (rankFilter === 'top3') matchesRank = comp.rank && comp.rank <= 3;
                if (rankFilter === 'top10') matchesRank = comp.rank && comp.rank <= 10;
                
                const matchesPlatform = platformFilter === 'all' || comp.platform === platformFilter;
                
                return matchesSearch && matchesRank && matchesPlatform;
            });
            
            renderTable(filtered);
        }

        function exportData() {
            let csv = 'Competition,Platform,Rank,Score,Techniques,Status\n';
            competitions.forEach(comp => {
                csv += `"${comp.name}","${comp.platform}","${comp.rank || 'N/A'}","${comp.score}","${comp.techniques.join('; ')}","${comp.status}"\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'ml_competition_war_room.csv';
            a.click();
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', filterData);
        document.getElementById('filterRank').addEventListener('change', filterData);
        document.getElementById('filterPlatform').addEventListener('change', filterData);

        // Initial render
        renderTable(competitions);
    </script>
</body>
</html>
